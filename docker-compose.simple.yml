services:
  # Gateway Database (PostgreSQL)
  gateway_db:
    image: postgres:15-alpine
    container_name: maritime_gateway_db
    environment:
      POSTGRES_DB: felatiko
      POSTGRES_USER: felatiko
      POSTGRES_PASSWORD: felatiko
    ports:
      - "5432:5432"
    volumes:
      - gateway_db_data:/var/lib/postgresql/data
    networks:
      - gateway_network

  # Redis for Gateway
  gateway_redis:
    image: redis:7-alpine
    container_name: maritime_gateway_redis
    ports:
      - "6380:6379"
    volumes:
      - gateway_redis_data:/data
    networks:
      - gateway_network

  # Gateway API
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: maritime_gateway
    command: ["uvicorn", "--app-dir", "/app", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - DATABASE_URL=postgresql://felatiko:felatiko@gateway_db:5432/felatiko
      - REDIS_URL=redis://gateway_redis:6379/0
      - BACKEND_URL=http://host.docker.internal:8000
      - DEBUG=true
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=gateway-super-secret-key-change-in-production
      - ENCRYPTION_KEY=encryption-key-32-chars-long-please
    ports:
      - "8080:8080"
    depends_on:
      - gateway_db
      - gateway_redis
    networks:
      - gateway_network
    restart: unless-stopped

volumes:
  gateway_db_data:
  gateway_redis_data:

networks:
  gateway_network:
    driver: bridge
