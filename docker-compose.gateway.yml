services:
  # Gateway Database (PostgreSQL)
  gateway_db:
    image: postgres:15-alpine
    container_name: maritime_gateway_db
    environment:
      POSTGRES_DB: felatiko
      POSTGRES_USER: felatiko
      POSTGRES_PASSWORD: felatiko
    ports:
      - "5433:5432"  # Accessible from host localhost:5433
    volumes:
      - gateway_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felatiko"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway_network

  # Redis for Gateway
  gateway_redis:
    image: redis:7-alpine
    container_name: maritime_gateway_redis
    ports:
      - "6380:6379"  # Different port to avoid conflict with main Redis
    volumes:
      - gateway_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway_network

  # Gateway API
  gateway:
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    container_name: maritime_gateway
    command: ["uvicorn", "--app-dir", "/app", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - DATABASE_URL=postgresql://felatiko:felatiko@gateway_db:5432/felatiko
      - REDIS_URL=redis://gateway_redis:6379/0
      - BACKEND_URL=http://api:8000
      - DEBUG=true
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - SECRET_KEY=gateway-super-secret-key-change-in-production
      - ENCRYPTION_KEY=encryption-key-32-chars-long-please
    ports:
      - "8080:8080"  # Gateway exposed to frontend
    depends_on:
      gateway_db:
        condition: service_healthy
      gateway_redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - gateway_network
      - maritime_network  # Connect to main network to access backend
    restart: unless-stopped

  # Main Backend API (existing)
  api:
    build: .
    container_name: maritime_api
    command: ["uvicorn", "--app-dir", "/app", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/maritime_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
    expose:
      - "8000"  # Only expose to gateway, not to host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maritime_network
    restart: unless-stopped

  # Main Database (existing)
  db:
    image: postgres:15-alpine
    container_name: maritime_db
    environment:
      POSTGRES_DB: maritime_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Different port for main database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maritime_network

  # Main Redis (existing)
  redis:
    image: redis:7-alpine
    container_name: maritime_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maritime_network

volumes:
  gateway_db_data:
  gateway_redis_data:
  postgres_data:
  redis_data:

networks:
  gateway_network:
    driver: bridge
    internal: false  # Allow external access for development
  
  maritime_network:
    driver: bridge
    internal: false  # Existing network
