<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-blue-600 rounded-full flex items-center justify-center">
        <i class="fas fa-shield-alt text-white text-2xl"></i>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Gateway Admin</h2>
      <p class="mt-2 text-sm text-gray-600">Sign in to access the admin configuration panel</p>
    </div>
    
    <form class="mt-8 space-y-6 bg-white shadow-lg rounded-lg p-8" (ngSubmit)="login()">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-gray-400"></i>
            </div>
            <input 
              id="username" 
              name="username" 
              type="text" 
              required 
              [(ngModel)]="credentials.username"
              class="pl-10 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
              placeholder="Enter your username">
          </div>
        </div>
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input 
              id="password" 
              name="password" 
              [type]="showPassword ? 'text' : 'password'" 
              required 
              [(ngModel)]="credentials.password"
              class="pl-10 pr-10 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
              placeholder="Enter your password">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
              <button type="button" (click)="togglePasswordVisibility()" class="text-gray-400 hover:text-gray-500">
                <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'" class="h-5 w-5"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember" name="remember" type="checkbox" [(ngModel)]="rememberMe"
                 class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
          <label for="remember" class="ml-2 block text-sm text-gray-900">Remember me</label>
        </div>
      </div>

      <div>
        <button 
          type="submit" 
          [disabled]="loading"
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
          <span class="absolute left-0 inset-y-0 flex items-center pl-3">
            <i [class]="loading ? 'fas fa-spinner fa-spin' : 'fas fa-sign-in-alt'" class="group-hover:text-blue-400"></i>
          </span>
          <span>{{ loading ? 'Signing in...' : 'Sign in' }}</span>
        </button>
      </div>

      <div *ngIf="error" class="rounded-lg bg-red-50 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <i class="fas fa-exclamation-circle text-red-400"></i>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-medium text-red-800">Authentication failed</h3>
            <div class="mt-2 text-sm text-red-700">
              <p>{{ error }}</p>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="text-center text-sm text-gray-500">
      <p>Maritime Gateway Administration Panel</p>
      <p class="mt-1">Secure Access Management System</p>
    </div>
  </div>
</div>
